<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>SFMShop - Админ панель</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      
      h1 {
        color: #333;
        text-align: center;
      }
      
      form {
        background-color: f5f5f5;
        padding: 20px;
        border-radius: 5px;
      }
      
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      
      input {
        width: 100%;
        padding: 8%;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 3px;
      }
      
      button {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      
      button:hover {
        background-color: #45a049;
      }
      
      #message {
        margin-top: 20px;
        padding: 10px;
        border-radius: 3px;
      }
      
      .success {
        background-color: #4dedda;
        color: #721c24;
        
      }
    
    
    </style>
  </head>
  <h1>Админ-панель SFMShop</h1>
  <form id="productForm">
    <div>
      <label for="name">Название товара</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div>
      <label for="price">Цена</label>
      <input type="number" id="price" name="price" step="0.01" required>
    </div>
    <div>
      <label for="stock">Количество товара</label>
      <input type="number" id="stock" name="stock" required>
    </div>
    
    <button type="submit">Добавить товар</button>
  </form>
  
  <div id="message"></div>
  <script>
    
    
    // Обработка отправки формы
    document.getElementById("productForm").addEventListener("submit", async function (event) {
        event.preventDefault(); // предотвратить стандартную отправку формы
        
        // получение данных из формы
        // создаем объект с полями формы
        const formData = {
          name: document.getElementById("name").value,
          price: parseFloat(document.getElementById("price").value),
          stock: parseInt(document.getElementById("stock").value)
        };
        
        //отправка данных на сервер через fetch
        try {
          const response = await fetch("http://localhost:8000/products", {
            "method": "POST",
            "headers": {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
          });
          if (response.ok) {
            const result = await response.json();
            document.getElementById("message").textContent = `Товар успешно создан!: ${result.name} `;
          } else {
            document.getElementById("message").textContent = "Ошибка при создании товара";
          }
        } catch (error) {
          document.getElementById("message").textContent = `Ошибка: ${error.message}`;
        }
      }
    );
  </script>
</html>

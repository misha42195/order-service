<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ панель создание товара</title>
    <style>
      body {
        background-color: #121212;
        color: #eeeeee;
        font-family: sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
      }
      
      h1 {
        text-align: center;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
      }
      
      form {
        background-color: #1e1e1e;
        padding: 20px;
        border: 1px solid #333;
      }
      
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        color: #999;
      }
      
      input {
        width: 100%;
        background-color: #121212;
        border: 1px solid #444;
        color: #fff;
        padding: 10px;
        margin-bottom: 20px;
        box-sizing: border-box;
        border-radius: 0;
      }
      
      input:focus {
        border-color: #00ff00;
        outline: none;
      }
      
      button {
        width: 100%;
        background-color: #333;
        color: #fff;
        border: 1px solid #555;
        padding: 12px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
      }
      
      button:hover {
        background-color: #444;
        border-color: #666;
      }
      
      #message {
        margin-top: 20px;
        padding: 10px;
        font-size: 14px;
        border: 1px solid transparent;
      }
      
      .success {
        border-color: #2e7d32;
        color: #4caf50;
      }
      
      .error {
        border-color: #c62828;
        color: #ef5350;
      }
      
      
      #producsList {
        margin-top: 30px;
        width: 100%;
      }
      
      table {
        width: 100%;
        border-collapse: collapse;
        border-color: #1e1e1e;
        border: 1px solid #333;
      }
      
      th, td {
        padding: 12px;
        text-align: left;
        border: 1px solid #333;
        
      }
      
      th {
        background-color: #252525;
        color: #999;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      td {
        font-size: 14px;
        color: #fff;
      }
      
      tr:hover td {
        background-color: #252525;
      }
      
      .refresh-btn {
        margin-bottom: 15px;
        background-color: #1a1a1a;
        border-color: #444;
        width: auto;
        padding: 8px 16px;
        font-size: 12px;
      }
      
      .badge {
        color: #00ff00;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <h1>Админ панель SFMShop</h1>
    <div>
      <form id="productForm">
        <div>
          <label for="name">Название товара</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div>
          <label for="price">Стоимость товара</label>
          <input type="number" id="price" name="price" step="0.01" min="0" required>
        </div>
        <div>
          <label for="stock">Количество на складе</label>
          <input type="number" id="stock" name="stock" min="0">
        </div>
        <button type="submit">Добавить товар</button>
      </form>
      <div id="message">
      </div>
    </div>
    <h1>Список товаров</h1>
    <div>
      <button id="getProductsBtn" class="refresh-btn">Получить список товаров</button>
    </div>
    <div id="producsLists"></div>
    <div>
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Название</th>
          <th>Цена</th>
          <th>Кол-во на складе</th>
        </tr>
        </thead>
        <tbody id="productsTableBody">
        </tbody>
      </table>
    </div>
    
    <script>
      // Обработка отправки формы
      document.getElementById("productForm").addEventListener(
        "submit",
        async function (event) {
          event.preventDefault();
          
          // получение данных из формы
          const formData = {
            name: document.getElementById("name").value,
            price: parseFloat(document.getElementById("price").value),
            stock: parseInt(document.getElementById("stock").value)
          };
          
          // отправка данных на сервер
          try {
            const response = await fetch(
              "http://localhost:8000/api/products", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
              });
            
            const messageDiv = document.getElementById("message");
            
            if (response.ok) {
              const result = await response.json();
              messageDiv.textContent = `Товар успешено создан id: ${result.id}`;
              messageDiv.className = "success";
              
              // очистка формы
              document.getElementById("productForm").reset();
            } else {
              const error = await response.json();
              messageDiv.textContent = `Ошибка: ${error.detail || "Неизвестная ошибка"}`;
              messageDiv.className = "error";
            }
          } catch (error) {
            const messageDiv = document.getElementById("message");
            messageDiv.textContent = `Ошибка подключения: ${error.message}`;
            messageDiv.className = `error`;
          }
        }
      );
    </script>
    
    <script>
      document.getElementById("getProductsBtn").addEventListener("click", async function () {
        try {
          const response = await fetch(
            "http://localhost:8000/api/v1/products", {
              method: "GET",
              headers: {
                "Accept": "application/json",
                "Content-Type": "application/json",
              }
            }
          );
          
          // 1. Получаем объект от сервера (в нём лежит ключ "products")
          const result = await response.json();
          
          // 2. Достаем сам массив из этого объекта
          const actualList = result.products;
          
          const tbody = document.getElementById("productsTableBody");
          
          // 3. Используем именно actualList для отрисовки
          tbody.innerHTML = "";
          for (let i = 0; i < actualList.length; i++) {
            const p = actualList[i];
            const rowNumber = i + 1;
            
            const row = `
            <tr>
              <td>${rowNumber}</td>
              <td>${p.name}</td>
              <td>${p.price}</td>
              <td>${p.stock}шт.</td>
            </tr>
            `;
            tbody.innerHTML += row;
          }
          
        } catch (error) {
          console.error("Не удалось загрузить товары:", error);
          // Выведи ошибку в блок message, чтобы видеть её на экране
          document.getElementById("message").textContent = "Ошибка: " + error.message;
        }
      });
    </script>
  </body>
</html>
